version: 2
updates:
  # Configuration for Go Modules
  - package-ecosystem: "gomod"
    directory: "/" # Location of your go.mod file
    schedule:
      interval: "weekly" # Check for updates every Monday
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "chore(deps):"
    # Groups minor and patch updates into a single PR to reduce noise [citation:1][citation:9]
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
